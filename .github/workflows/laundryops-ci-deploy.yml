name: LaundryOps CI and Firebase Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/laundryops-ci-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/laundryops-ci-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy hosting
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAUNDROMAT_MAINTENANCE_APP }}'

      - name: Build
        run: npm run build

      - name: Deploy LaundryOps hosting
        run: npx firebase-tools deploy --only hosting:laundryops --project laundromat-maintenance-app --non-interactive
