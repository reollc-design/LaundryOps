name: LaundryOps CI and Firebase Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/laundryops-ci-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/laundryops-ci-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

  validate-functions:
    name: Validate Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Type check Functions
        run: npm run lint

      - name: Build Functions
        run: npm run build

  validate-rules:
    name: Validate Firebase rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Test Firestore and Storage rules
        run: npx firebase-tools emulators:exec --project demo-laundryops-rules --only firestore,storage "npx vitest run --configLoader runner --config vitest.rules.config.ts"

  deploy:
    name: Deploy LaundryOps
    runs-on: ubuntu-latest
    needs:
      - validate
      - validate-functions
      - validate-rules
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_BILLING_API_BASE_URL: ${{ secrets.VITE_BILLING_API_BASE_URL }}
      VITE_FUNCTIONS_API_BASE_URL: ${{ secrets.VITE_FUNCTIONS_API_BASE_URL }}
      VITE_USE_FIREBASE_EMULATORS: 'false'
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAUNDROMAT_MAINTENANCE_APP }}'

      - name: Verify production Firebase config
        shell: bash
        run: |
          required_vars=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
            VITE_BILLING_API_BASE_URL
            VITE_FUNCTIONS_API_BASE_URL
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "$var_name is missing. Add it in GitHub repository secrets before deploying."
              exit 1
            fi
          done

      - name: Build
        run: npm run build

      - name: Deploy LaundryOps hosting, Firestore rules, and Storage rules
        run: npx firebase-tools deploy --only hosting:laundryops,firestore:rules,storage:laundryopsStorage --project laundromat-maintenance-app --non-interactive
